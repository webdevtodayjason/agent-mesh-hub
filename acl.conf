# Agent Mesh Hub — MQTT ACL
# Per-agent topic permissions
# Format: user <username> { topic <read|write|readwrite> <pattern> }

### === WARLOCK (red team / security / infra) ===
user warlock
topic readwrite agents/warlock/#
topic readwrite agents/broadcast/#
topic read tasks/queue/#
topic write tasks/queue/warlock
topic readwrite presence/warlock
topic read presence/#
topic read system/#

### === EVY (documentation / research / coordination) ===
user evy
topic readwrite agents/evy/#
topic readwrite agents/broadcast/#
topic read tasks/queue/#
topic write tasks/queue/evy
topic readwrite presence/evy
topic read presence/#
topic read system/#

### === JASON (operator — full access) ===
user jason
topic readwrite #

### === FUTURE AGENTS — add below, follow the pattern ===
# user <agent-name>
# topic readwrite agents/<agent-name>/#
# topic readwrite agents/broadcast/#
# topic read tasks/queue/#
# topic write tasks/queue/<agent-name>
# topic readwrite presence/<agent-name>
# topic read presence/#

### === SHARED PATTERNS ===
# pattern: agents/${clientid}/inbox = per-agent message routing
# pattern: tasks/queue/<agent> = task assignment to specific agent
# pattern: agents/broadcast = fan-out to all agents
# pattern: presence/<agent> = online status / heartbeat
# pattern: system/ = broker announcements
